<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoDrive - Cadastrar Carro</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:ital,wght@0,300;0,400;0,500;0,600;1,300&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="/src/index.css">
</head>

<body>

    <!-- NAVBAR -->
    <nav>
        <a href="../cars/" class="nav-logo">Auto<span>Drive</span></a>
        <ul class="nav-links">
            <li><a href="../cars/">Garagem</a></li>
            <li><a href="../login/">Sair</a></li>
        </ul>
    </nav>

    <!-- CONTENT -->
    <main>
        <div class="edit-wrapper anim-fadeup">
            <div class="edit-header">
                <h1 id="page-title">Cadastrar Veículo</h1>
                <p id="page-subtitle">Adicione um novo carro ao inventário</p>
            </div>
            
            <div class="edit-form">
                <form id="car-form" enctype="multipart/form-data">
                    <table class="django-form">
                        <tr>
                            <th><label for="model">Modelo</label></th>
                            <td><input type="text" id="model" name="model" required placeholder="Ex: Civic"></td>
                        </tr>
                        <tr>
                            <th><label for="brand">Marca</label></th>
                            <td>
                                <select id="brand" name="brand" required>
                                    <option value="" class="bg-brand-panel">Selecione uma marca</option>
                                </select>
                            </td>
                        </tr>
                        <tr>
                            <th><label for="factory_year">Ano de Fabricação</label></th>
                            <td><input type="number" id="factory_year" name="factory_year" placeholder="Ex: 2020"></td>
                        </tr>
                        <tr>
                            <th><label for="model_year">Ano do Modelo</label></th>
                            <td><input type="number" id="model_year" name="model_year" placeholder="Ex: 2021"></td>
                        </tr>
                        <tr>
                            <th><label for="plate">Placa</label></th>
                            <td><input type="text" id="plate" name="plate" placeholder="Ex: ABC-1234"></td>
                        </tr>
                        <tr>
                            <th><label for="value">Valor (R$)</label></th>
                            <td><input type="number" step="0.01" id="value" name="value" placeholder="Ex: 85000"></td>
                        </tr>
                        <tr>
                            <th><label for="photo">Foto</label></th>
                            <td><input type="file" id="photo" name="photo" accept="image/*"></td>
                        </tr>
                        <tr>
                            <th><label for="bio">Descrição / Bio</label></th>
                            <td><textarea id="bio" name="bio" placeholder="Descreva os detalhes do automóvel..."></textarea></td>
                        </tr>
                    </table>
                    
                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary" id="btn-save-car">Salvar Alterações</button>
                        <a href="../cars/" class="btn btn-ghost">Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <!-- FOOTER -->
    <footer>
        <div class="footer-logo">Auto<span>Drive</span></div>
        <p>&copy; 2026 Caio Sampaio &mdash; Todos os direitos reservados</p>
    </footer>

    <!-- Scripts -->
    <script type="module" src="/src/new_car.ts"></script>

</body>
</html>
