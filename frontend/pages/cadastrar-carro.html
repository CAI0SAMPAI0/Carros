<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoDrive - Cadastrar Carro</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:ital,wght@0,300;0,400;0,500;0,600;1,300&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              'brand-black': '#0a0a0b',
              'brand-dark': '#111114',
              'brand-panel': '#18181c',
              'brand-border': '#2a2a30',
              'brand-muted': '#3a3a42',
              'brand-text-dim': '#6b6b7a',
              'brand-text': '#c8c8d4',
              'brand-text-hi': '#eeeef5',
              'brand-red': '#e52222',
              'brand-red-dim': '#7a1010',
            },
            fontFamily: {
              bebas: ['Bebas Neue', 'sans-serif'],
              barlow: ['Barlow', 'sans-serif'],
              'barlow-cond': ['Barlow Condensed', 'sans-serif'],
            }
          }
        }
      }
    </script>
    <style>
      body {
        background-image: repeating-linear-gradient(
          105deg,
          transparent 0px,
          transparent 18px,
          rgba(255, 255, 255, 0.018) 18px,
          rgba(255, 255, 255, 0.018) 19px
        );
      }
    </style>
</head>

<body class="bg-brand-black text-brand-text font-barlow min-h-screen flex flex-col justify-between">

    <!-- NAVBAR -->
    <nav class="sticky top-0 z-50 bg-brand-black/90 backdrop-blur-md border-b border-brand-border h-16 px-8 flex items-center justify-between">
        <a href="../index.html" class="font-bebas text-3xl tracking-widest text-brand-text-hi flex items-center gap-2">
            <span class="w-1.5 h-1.5 bg-brand-red rounded-full shadow-[0_0_10px_#e52222]"></span>
            Auto<span class="text-brand-red">Drive</span>
        </a>
        <ul class="flex items-center gap-1 font-barlow-cond text-xs font-semibold tracking-widest uppercase list-none">
            <li><a href="../index.html" class="text-brand-text-dim hover:text-brand-text-hi hover:bg-brand-panel px-3.5 py-1.5 rounded-sm transition-all">Garagem</a></li>
            <li><a href="login.html" class="text-brand-text-dim hover:text-brand-text-hi hover:bg-brand-panel px-3.5 py-1.5 rounded-sm transition-all">Sair</a></li>
        </ul>
    </nav>

    <!-- FORM CARD -->
    <main class="flex-1 py-12 px-4 max-w-2xl mx-auto w-full">
        <div class="bg-brand-panel border border-brand-border rounded-md p-10">
            <h2 class="font-bebas text-3xl tracking-wider text-brand-text-hi mb-1">Cadastrar Carro</h2>
            <p class="font-barlow-cond text-xs tracking-[0.15em] text-brand-text-dim uppercase pb-6 border-b border-brand-border mb-6">Adicione um novo carro ao inventário</p>
            
            <form id="car-form" class="space-y-6" enctype="multipart/form-data">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label for="model" class="block font-barlow-cond text-xs font-semibold tracking-widest uppercase text-brand-text-dim mb-2">Modelo</label>
                        <input type="text" id="model" name="model" required placeholder="Ex: Civic" class="w-full bg-brand-dark border border-brand-border rounded-sm text-brand-text-hi px-4 py-3 focus:outline-none focus:border-brand-red transition-all">
                    </div>
                    <div>
                        <label for="brand" class="block font-barlow-cond text-xs font-semibold tracking-widest uppercase text-brand-text-dim mb-2">Marca</label>
                        <select id="brand" name="brand" required class="w-full bg-brand-dark border border-brand-border rounded-sm text-brand-text-hi px-4 py-3 focus:outline-none focus:border-brand-red transition-all">
                            <option value="" class="bg-brand-panel">Selecione uma marca</option>
                            <!-- Marcas devem ser injetadas via JavaScript a partir do backend -->
                            <option value="1" class="bg-brand-panel">Honda</option>
                            <option value="2" class="bg-brand-panel">Toyota</option>
                            <option value="3" class="bg-brand-panel">Chevrolet</option>
                            <option value="4" class="bg-brand-panel">Ford</option>
                        </select>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div>
                        <label for="factory_year" class="block font-barlow-cond text-xs font-semibold tracking-widest uppercase text-brand-text-dim mb-2">Ano de Fabricação</label>
                        <input type="number" id="factory_year" name="factory_year" placeholder="Ex: 2020" class="w-full bg-brand-dark border border-brand-border rounded-sm text-brand-text-hi px-4 py-3 focus:outline-none focus:border-brand-red transition-all">
                    </div>
                    <div>
                        <label for="model_year" class="block font-barlow-cond text-xs font-semibold tracking-widest uppercase text-brand-text-dim mb-2">Ano do Modelo</label>
                        <input type="number" id="model_year" name="model_year" placeholder="Ex: 2021" class="w-full bg-brand-dark border border-brand-border rounded-sm text-brand-text-hi px-4 py-3 focus:outline-none focus:border-brand-red transition-all">
                    </div>
                    <div>
                        <label for="plate" class="block font-barlow-cond text-xs font-semibold tracking-widest uppercase text-brand-text-dim mb-2">Placa</label>
                        <input type="text" id="plate" name="plate" placeholder="Ex: ABC-1234" class="w-full bg-brand-dark border border-brand-border rounded-sm text-brand-text-hi px-4 py-3 focus:outline-none focus:border-brand-red transition-all">
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label for="value" class="block font-barlow-cond text-xs font-semibold tracking-widest uppercase text-brand-text-dim mb-2">Valor (R$)</label>
                        <input type="number" step="0.01" id="value" name="value" placeholder="Ex: 85000" class="w-full bg-brand-dark border border-brand-border rounded-sm text-brand-text-hi px-4 py-3 focus:outline-none focus:border-brand-red transition-all">
                    </div>
                    <div>
                        <label for="photo" class="block font-barlow-cond text-xs font-semibold tracking-widest uppercase text-brand-text-dim mb-2">Foto</label>
                        <input type="file" id="photo" name="photo" accept="image/*" class="w-full bg-brand-dark border border-brand-border rounded-sm text-brand-text-hi px-4 py-2 focus:outline-none focus:border-brand-red transition-all file:mr-4 file:py-1 file:px-4 file:rounded-sm file:border-0 file:text-xs file:font-semibold file:bg-brand-red file:text-white hover:file:bg-brand-red/90 file:cursor-pointer">
                    </div>
                </div>

                <div>
                    <label for="bio" class="block font-barlow-cond text-xs font-semibold tracking-widest uppercase text-brand-text-dim mb-2">Descrição / Bio</label>
                    <textarea id="bio" name="bio" rows="4" placeholder="Descreva os detalhes do automóvel..." class="w-full bg-brand-dark border border-brand-border rounded-sm text-brand-text-hi px-4 py-3 focus:outline-none focus:border-brand-red transition-all resize-none"></textarea>
                </div>

                <div class="flex gap-4 pt-4 border-t border-brand-border">
                    <button type="submit" class="flex-1 bg-brand-red text-white font-barlow-cond font-bold tracking-widest text-sm uppercase py-3 rounded-sm hover:bg-brand-red/90 transition-all shadow-[0_4px_20px_rgba(229,34,34,0.25)]">
                        Salvar Carro
                    </button>
                    <a href="../index.html" class="flex-1 border border-brand-border text-center text-brand-text font-barlow-cond font-bold tracking-widest text-sm uppercase py-3 rounded-sm hover:bg-brand-panel hover:text-brand-text-hi transition-all">
                        Cancelar
                    </a>
                </div>
            </form>
        </div>
    </main>

    <!-- FOOTER -->
    <footer class="bg-brand-panel border-t border-brand-border px-8 py-6 flex items-center justify-between">
        <div class="font-bebas text-lg tracking-widest text-brand-text-dim">
            Auto<span class="text-brand-red">Drive</span>
        </div>
        <p class="font-barlow-cond text-[10px] tracking-widest text-brand-muted uppercase">
            &copy; 2026 Caio Sampaio &mdash; Todos os direitos reservados
        </p>
    </footer>

</body>
</html>
