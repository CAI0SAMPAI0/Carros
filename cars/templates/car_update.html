{% extends "base.html" %}
{% block title %}Editar {{ object.model }} — AutoDrive{% endblock %}

{% block content %}
<style>
  .edit-wrapper {
    max-width: 700px;
    margin: 3rem auto;
    padding: 0 2rem;
  }

  .edit-header {
    margin-bottom: 2rem;
  }

  .edit-header h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.4rem;
    letter-spacing: 0.08em;
    color: var(--text-hi);
    line-height: 1;
  }

  .edit-header p {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.75rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-top: 0.3rem;
  }

  .edit-form {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 2rem;
  }

  .form-actions {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    flex-wrap: wrap;
    margin-top: 2rem;
    padding-top: 1.5rem;
    border-top: 1px solid var(--border);
  }

  .form-actions .spacer { flex: 1; }
</style>

<div class="edit-wrapper anim-fadeup">
  <div class="edit-header">
    <h1>Editar Veículo</h1>
    <p>{{ object.brand }} {{ object.model }}</p>
  </div>

  <div class="edit-form">
    <form method="post" enctype="multipart/form-data">
      {% csrf_token %}
      <table class="django-form">
        {{ form.as_table }}
      </table>
      <div class="form-actions">
        <button type="submit" class="btn btn-primary">Salvar Alterações</button>
        <a href="{% url 'cars_list' %}" class="btn btn-ghost">Cancelar</a>
        <div class="spacer"></div>
        <a href="{% url 'car_delete' pk=object.pk %}" class="btn btn-danger">Remover Veículo</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
